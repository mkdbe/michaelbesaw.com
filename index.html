        .image-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transform: translateX(0);
        }

        .image-slide.active {
            opacity: 1;
            transform: translateX(0);
            z-index: 2;
        }

        /* Wipe transition classes for Magic Mouse navigation */
        .image-slide.wipe-out-left {
            animation: wipeOutLeft 0.5s ease-out forwards;
            z-index: 1;
        }

        .image-slide.wipe-out-right {
            animation: wipeOutRight 0.5s ease-out forwards;
            z-index: 1;
        }

        .image-slide.wipe-in-left {
            animation: wipeInLeft 0.5s ease-out forwards;
            z-index: 2;
        }

        .image-slide.wipe-in-right {
            animation: wipeInRight 0.5s ease-out forwards;
            z-index: 2;
        }

        @keyframes wipeOutLeft {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(-100%);
                opacity: 1;
            }
        }

        @keyframes wipeOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 1;
            }
        }

        @keyframes wipeInLeft {
            from {
                transform: translateX(100%);
                opacity: 1;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes wipeInRight {

            .about-content {

<body>

    <button class="about-btn" id="aboutBtn">About</button>

    <div class="gallery-container" id="gallery"></div>

    <div class="hover-zone left" id="hoverZoneLeft"></div>
    <div class="hover-zone right" id="hoverZoneRight"></div>

    <div class="nav-arrow left" id="prevBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
    <div class="nav-arrow right" id="nextBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </div>

    <div class="about-overlay" id="aboutOverlay">
        <div class="about-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="aboutText"></div>
        </div>
    </div>

    <div class="loading" id="loading">Loading images...</div>

    <div class="photo-filename" id="photoFilename"></div>
    <div class="photo-date" id="photoDate"></div>

    <script>
        let images = [];
        let currentIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        let lastDirection = 'next'; // Track last swipe direction
        let showingInfo = false; // Toggle filename display with "i" key

        const SEEN_KEY = 'gallery_seen';

        // Load images from server
        async function loadImages() {
            try {
                const response = await fetch('/api/images');
                const data = await response.json();
                
                if (data.images && data.images.length > 0) {
                    images = data.images;
                    initGallery();
                } else {
                    document.getElementById('loading').textContent = 'No images found. Add photos to the "photos" folder!';
                }
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('loading').textContent = 'Error loading images. Make sure the server is running!';
            }
        }

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return '';
            
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            
            return `${year}${month}${day}`;
        }

        // Update photo date and filename display
        function updatePhotoDate(index) {
            const dateElement = document.getElementById('photoDate');
            const nameElement = document.getElementById('photoFilename');
            if (images[index]) {
                if (images[index].date) {
                    dateElement.textContent = formatDate(images[index].date);
                } else {
                    dateElement.textContent = '';
                }
                if (showingInfo) {
                    nameElement.textContent = images[index].url.split('/').pop();
                    nameElement.style.display = 'block';
                } else {
                    nameElement.style.display = 'none';
                }
            } else {
                dateElement.textContent = '';
                nameElement.style.display = 'none';
            }
        }

        // Load about text from server
        async function loadAboutText() {
            try {
                const response = await fetch('/api/about');
                const data = await response.json();
                
                if (data.content) {
                    document.getElementById('aboutText').innerHTML = data.content;
                } else {
                    document.getElementById('aboutText').innerHTML = '<p>About content not found.</p>';
                }
            } catch (error) {
                console.error('Error loading about text:', error);
                document.getElementById('aboutText').innerHTML = '<p>Error loading about content.</p>';
            }
        }

        // Shuffle array function (Fisher-Yates)
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // Get seen photos from sessionStorage
        function getSeenPhotos() {
            try {
                return JSON.parse(sessionStorage.getItem(SEEN_KEY) || '[]');
            } catch {
                return [];
            }
        }

        // Mark a photo as seen
        function markSeen(url) {
            const seen = getSeenPhotos();
            if (!seen.includes(url)) {
                seen.push(url);
                sessionStorage.setItem(SEEN_KEY, JSON.stringify(seen));
            }
        }

        // Initialize gallery with unseen-first ordering
        function initGallery() {
            let seen = getSeenPhotos();

            // If every photo has been seen, reset the cycle
            const allUrls = images.map(img => img.url);
            const unseenUrls = allUrls.filter(url => !seen.includes(url));

            if (unseenUrls.length === 0) {
                // Full cycle complete — clear seen list and start fresh
                seen = [];
                sessionStorage.setItem(SEEN_KEY, JSON.stringify(seen));
            }

            // Split into unseen and seen groups
            const unseen = images.filter(img => !seen.includes(img.url));
            const seenImages = images.filter(img => seen.includes(img.url));

            // Shuffle each group independently, unseen first
            images = [...shuffleArray(unseen), ...shuffleArray(seenImages)];

            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            // Only 3 slides: prev, current, next — avoids GPU compositor limits
            for (let i = 0; i < 3; i++) {
                const slide = document.createElement('div');
                slide.className = 'image-slide';
                slide.id = 'slide-' + i;
                if (i === 1) {
                    // Middle slide is the active one
                    slide.style.backgroundImage = `url('${images[0].url}')`;
                    slide.classList.add('active');
                    slide.style.opacity = '1';
                } else {
                    slide.style.opacity = '0';
                }
                gallery.appendChild(slide);
            }

            currentIndex = 0;
            updatePhotoDate(0);
            markSeen(images[0].url);

            // Preload next few images into browser cache
            preloadCache(0);

            document.getElementById('loading').style.display = 'none';
        }

        // Preload images into browser cache (not into DOM)
        function preloadCache(index) {
            for (let offset = 1; offset <= 5; offset++) {
                const i = (index + offset) % images.length;
                const img = new Image();
                img.src = images[i].url;
            }
        }

        // Show specific slide
        function showSlide(index, useWipe = false, direction = 'next') {
            // Safety check to ensure valid index
            if (images.length === 0) return;
            
            // Ensure index is within bounds
            if (index < 0) {
                index = images.length - 1;
            } else if (index >= images.length) {
                index = 0;
            }
            
            const slides = document.querySelectorAll('.image-slide');
            // slides[0] = prev, slides[1] = current, slides[2] = next
            
            if (useWipe) {
                let outgoing, incoming;
                if (direction === 'next') {
                    outgoing = slides[1]; // current
                    incoming = slides[2]; // next slot
                } else {
                    outgoing = slides[1]; // current
                    incoming = slides[0]; // prev slot
                }
                
                // Set the incoming slide's image
                incoming.style.backgroundImage = `url('${images[index].url}')`;
                incoming.style.opacity = '1';
                incoming.classList.add('active');
                incoming.style.transition = 'none';
                
                if (direction === 'next') {
                    incoming.style.transform = 'translateX(100%)';
                } else {
                    incoming.style.transform = 'translateX(-100%)';
                }
                
                // Force reflow
                incoming.offsetHeight;
                
                // Animate
                incoming.style.transition = 'transform 0.5s ease-out';
                outgoing.style.transition = 'transform 0.5s ease-out';
                
                setTimeout(() => {
                    incoming.style.transform = 'translateX(0)';
                    if (direction === 'next') {
                        outgoing.style.transform = 'translateX(-100%)';
                    } else {
                        outgoing.style.transform = 'translateX(100%)';
                    }
                }, 10);
                
                // Clean up after animation — reset all 3 slides
                setTimeout(() => {
                    slides.forEach((slide, i) => {
                        slide.style.transition = '';
                        slide.style.transform = '';
                        if (i === 1) {
                            // Center slide becomes the active one with new image
                            slide.style.backgroundImage = `url('${images[index].url}')`;
                            slide.classList.add('active');
                            slide.style.opacity = '1';
                        } else {
                            slide.classList.remove('active');
                            slide.style.opacity = '0';
                            slide.style.backgroundImage = '';
                        }
                    });
                }, 550);
            } else {
                // Instant cut — just swap the center slide's image
                slides.forEach((slide, i) => {
                    slide.style.transition = '';
                    slide.style.transform = '';
                    if (i === 1) {
                        slide.style.backgroundImage = `url('${images[index].url}')`;
                        slide.classList.add('active');
                        slide.style.opacity = '1';
                    } else {
                        slide.classList.remove('active');
                        slide.style.opacity = '0';
                        slide.style.backgroundImage = '';
                    }
                });
            }
            
            currentIndex = index;
            updatePhotoDate(index);
            markSeen(images[index].url);

            // Preload upcoming images into browser cache
            preloadCache(index);
        }

        // Next slide
        function nextSlide(useWipe = false) {
            if (images.length === 0) return;
            const nextIndex = (currentIndex + 1) % images.length;
            showSlide(nextIndex, useWipe, 'next');
        }

        // Previous slide
        function prevSlide(useWipe = false) {
            if (images.length === 0) return;
            const prevIndex = (currentIndex - 1 + images.length) % images.length;
            showSlide(prevIndex, useWipe, 'prev');
        }

        // Hover zone click handlers for navigation
        const hoverZoneLeft = document.getElementById('hoverZoneLeft');
        const hoverZoneRight = document.getElementById('hoverZoneRight');

        // Click on left/right halves to navigate
        hoverZoneLeft.addEventListener('click', () => {
            prevSlide();
        });

        hoverZoneRight.addEventListener('click', () => {
            nextSlide();
        });

        // About overlay controls
        const aboutOverlay = document.getElementById('aboutOverlay');
        const closeBtn = document.getElementById('closeBtn');

        aboutBtn.addEventListener('click', () => {
            aboutOverlay.classList.add('active');
            loadAboutText();
        });

        closeBtn.addEventListener('click', () => {
            aboutOverlay.classList.remove('active');
        });

        // Close overlay when clicking outside content
        aboutOverlay.addEventListener('click', (e) => {
            if (e.target === aboutOverlay) {
                aboutOverlay.classList.remove('active');
            }
        });

        // Close overlay with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && aboutOverlay.classList.contains('active')) {
                aboutOverlay.classList.remove('active');
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (aboutOverlay.classList.contains('active')) return; // Don't navigate when About is open
            
            if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'i' || e.key === 'I') {
                showingInfo = !showingInfo;
                updatePhotoDate(currentIndex);
            }
        });

        // Touch/Swipe support
        const gallery = document.getElementById('gallery');

        gallery.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        gallery.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        // Mouse drag support for touchpad
        let mouseStartX = 0;
        let mouseEndX = 0;
        let isDragging = false;

        gallery.addEventListener('mousedown', (e) => {
            isDragging = true;
            mouseStartX = e.screenX;
        });

        gallery.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            mouseEndX = e.screenX;
            handleMouseSwipe();
        });

        gallery.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Magic Mouse and trackpad swipe support
        let lastWheelTime = 0;
        let wheelDeltaX = 0;
        let isScrolling = false;
        
        // Prevent browser navigation on horizontal scroll (especially Firefox)
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('wheel', (e) => {
            const now = Date.now();
            
            // Detect horizontal scroll (Magic Mouse swipe)
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY) && Math.abs(e.deltaX) > 4) {
                // CRITICAL: Prevent browser back/forward navigation
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                
                if (!isScrolling) {
                    wheelDeltaX = 0;
                    isScrolling = true;
                }
                
                wheelDeltaX += e.deltaX;
                
                // Reset after period of inactivity
                clearTimeout(window.wheelTimeout);
                window.wheelTimeout = setTimeout(() => {
                    wheelDeltaX = 0;
                    isScrolling = false;
                }, 300);
                
                // Higher threshold and longer debounce to prevent skipping
                if (Math.abs(wheelDeltaX) > 120 && now - lastWheelTime > 1000) {
                    if (wheelDeltaX > 0) {
                        // Swiping left (positive deltaX) - go to next with wipe
                        nextSlide(true);
                    } else {
                        // Swiping right (negative deltaX) - go to previous with wipe
                        prevSlide(true);
                    }
                    wheelDeltaX = 0;
                    lastWheelTime = now;
                    isScrolling = false;
                }
                
                return false;
            }
        }, { passive: false, capture: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swiped left - show next with wipe
                    nextSlide(true);
                } else {
                    // Swiped right - show previous with wipe
                    prevSlide(true);
                }
            }
        }

        function handleMouseSwipe() {
            const swipeThreshold = 50;
            const diff = mouseStartX - mouseEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swiped left - show next with wipe
                    nextSlide(true);
                } else {
                    // Swiped right - show previous with wipe
                    prevSlide(true);
                }
            }
        }

        // Initialize - load images from server
        loadImages();
    </script>

(function() {
    const params = new URLSearchParams(window.location.search);
    const utmSource   = params.get('utm_source')   || '';
    const utmMedium   = params.get('utm_medium')   || '';
    const utmCampaign = params.get('utm_campaign')  || '';

    fetch('/api/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            path: window.location.pathname,
            referer: document.referrer || 'Direct',
            utm_source: utmSource,
            utm_medium: utmMedium,
            utm_campaign: utmCampaign
        })
    }).catch(() => {});

    // Strip UTM params from URL bar without reload
    if (utmSource || utmMedium || utmCampaign) {
        window.history.replaceState({}, '', window.location.pathname);
    }
})();

// Heartbeat every 10 seconds
setInterval(() => {
    fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
}, 10000);

// Track navigation clicks
document.addEventListener('keydown', () => {
    fetch('/api/track-nav', { method: 'POST' }).catch(() => {});
});
document.addEventListener('click', () => {
    fetch('/api/track-nav', { method: 'POST' }).catch(() => {});
});
document.addEventListener('touchend', () => {
    fetch('/api/track-nav', { method: 'POST' }).catch(() => {});
});
</script>
